name: Docs

on:
  pull_request:
  push:
    branches: [main, master, 'codex/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  docs:
    name: Astro docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install docs dependencies
        run: npm install --prefix docs-site --no-audit --no-fund

      - name: Install parameter generator dependencies
        run: python -m pip install PyYAML

      - name: Generate parameter catalog
        run: python docs-site/generate_parameters.py

      - name: Check docs
        run: npm run docs:check

      - name: Build docs
        run: npm run docs:build

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && vars.ENABLE_GITHUB_PAGES_DEPLOY == 'true'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && vars.ENABLE_GITHUB_PAGES_DEPLOY == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs-site/dist

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && vars.ENABLE_GITHUB_PAGES_DEPLOY == 'true'
        uses: actions/deploy-pages@v4
