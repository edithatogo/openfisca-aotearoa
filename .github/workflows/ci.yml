name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.11

      - name: Install Dependencies
        run: uv sync --extra dev

      - name: Check uv and una workspace integration
        run: uv run --extra dev python scripts/smoke_workspace.py

      - name: Smoke high-performance API server
        run: uv run python scripts/smoke_api_server.py

      - name: Run Ruff Lint Checks
        uses: astral-sh/ruff-action@v1
        with:
          args: "check --output-format=github ."

      - name: Type Check with Basedpyright
        run: uv run basedpyright openfisca_aotearoa

      - name: Check Cognitive Complexity with Complexipy
        run: uv run python scripts/run_complexity_gate.py

      - name: Run OpenFisca Core v44 Compatibility YAML Tests
        run: |
          uv run python scripts/run_openfisca_yaml_tests.py \
            openfisca_aotearoa/tests/social_security/accommodation_supplement/2018/situation.yaml \
            openfisca_aotearoa/tests/income_tax/family_scheme/family_tax_credit.yaml

      - name: Run Accepted AI-Generated Tests
        run: uv run pytest openfisca_aotearoa/tests/test_ai_test_automation.py --strict-markers --strict-config -W error

      - name: Run Test Suite
        run: uv run pytest --cov=openfisca_aotearoa --cov-report=xml --strict-markers --strict-config -W error

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
