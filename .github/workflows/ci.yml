name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.11

      - name: Install Dependencies
        run: uv sync --extra dev

      - name: Check uv and una workspace integration
        run: uv run --extra dev python scripts/smoke_workspace.py

      - name: Run Ruff Lint Checks
        uses: astral-sh/ruff-action@v1
        with:
          args: "check --output-format=github ."

      - name: Type Check with Basedpyright
        run: uv run basedpyright openfisca_aotearoa

      - name: Check Cognitive Complexity with Complexipy
        run: uv run complexipy openfisca_aotearoa --max-complexity-allowed 15

      - name: Run Test Suite
        run: uv run pytest --cov=openfisca_aotearoa --cov-report=xml --strict-markers --strict-config -W error

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
